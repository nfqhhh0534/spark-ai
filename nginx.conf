worker_processes  1;
events {
    worker_connections  1024;
}
http {
    # 直接内置最基础的 mime types，彻底不依赖外部文件
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        application/json                      json;
        image/png                             png;
        image/jpeg                            jpeg jpg;
        image/svg+xml                         svg;
        image/x-icon                          ico;
    }
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       9000;
        server_name  localhost;

        location / {
            root   /code/dist;
            index  index.html index.htm;
            # 这一句是前端路由刷新不报 404 的关键
            try_files $uri $uri/ /index.html;
        }
    }
}
